name: codex-review

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  codex:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}
    steps:
      - name: Skip if OPENAI_API_KEY is not configured
        if: env.OPENAI_API_KEY == ''
        run: |
          echo "::notice title=Codex review skipped::OPENAI_API_KEY secret is not configured for this repository. Add it under Settings → Secrets and variables → Actions to enable Codex reviews on PRs."

      - uses: actions/checkout@v5
        if: env.OPENAI_API_KEY != ''
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge

      - name: Pre-fetch base and head refs for the PR
        if: env.OPENAI_API_KEY != ''
        env:
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git fetch --no-tags origin \
            "$PR_BASE_REF" \
            "+refs/pull/$PR_NUMBER/head"

      - name: Run Codex
        id: run_codex
        if: env.OPENAI_API_KEY != ''
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            This is PR #${{ github.event.pull_request.number }} for ${{ github.repository }}.
            Review ONLY the changes introduced by the PR and call out concrete, actionable issues.

            Focus on:
            - correctness and regressions
            - security/privacy concerns
            - missing tests or edge cases
            - maintainability and readability

            Pull request title and body:
            ----
            ${{ github.event.pull_request.title }}
            ${{ github.event.pull_request.body }}
          output-file: codex-review.md

  post-feedback:
    runs-on: ubuntu-latest
    needs: codex
    if: ${{ needs.codex.outputs.final_message != '' }}
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Report Codex feedback
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.codex.outputs.final_message }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: process.env.CODEX_FINAL_MESSAGE,
            });
